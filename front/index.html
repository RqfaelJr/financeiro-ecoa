<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Financeiro - Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
      body { font-family: 'Inter', sans-serif; background: #eaebef; margin: 0; padding: 0; }
      
      /* Header */
      .header-bar { background: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
      .header-left { display: flex; align-items: center; gap: 15px; }
      .header-title { font-size: 1.15rem; font-weight: 600; margin: 0; border-left: 2px solid #ddd; padding-left: 15px; color: #111; }
      .header-logo { font-weight: 700; font-size: 1.25rem; color: #4a5568; display: flex; align-items: center; gap: 8px; }
      .header-logo i { color: #3182ce; }

      /* Module Cards */
      .cards-container {
          display: flex;
          justify-content: center;
          flex-wrap: wrap;
          gap: 30px;
          padding-top: 5rem;
          max-width: 1200px;
          margin: 0 auto;
      }
      .module-card {
          background: #fdfdfd;
          border-radius: 12px;
          box-shadow: inset 1px 1px 0 rgba(255,255,255,1), 2px 4px 8px rgba(0,0,0,0.08), -1px -1px 2px rgba(255,255,255,0.6);
          border: 1px solid #d1d5da;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 25px 20px;
          width: 270px;
          height: 220px;
          text-align: center;
          cursor: pointer;
          transition: transform 0.2s, box-shadow 0.2s;
          text-decoration: none;
      }
      .module-card:active {
          box-shadow: inset 2px 2px 4px rgba(0,0,0,0.08);
          transform: translateY(1px);
      }
      .module-card:hover {
          background: #fff;
          transform: translateY(-4px);
          box-shadow: 4px 8px 16px rgba(0,0,0,0.12);
      }
      .module-icon {
          font-size: 4rem;
          color: #8c929a;
          margin-bottom: 20px;
          transition: color 0.2s;
      }
      .module-text {
          font-size: 1.15rem;
          color: #111;
          font-weight: 600;
          line-height: 1.3;
      }
      .module-card:hover .module-icon {
          color: #3182ce;
      }
      .welcome-text {
          text-align: center;
          margin-top: 2rem;
          color: #6c757d;
          font-size: 1.1rem;
      }
  </style>
</head>
<body>
  <header class="header-bar">
      <div class="header-left">
          <div class="header-logo">
              <i class="fa-solid fa-layer-group"></i> Ecoa Financeiro
          </div>
          <h1 class="header-title">Painel Principal</h1>
      </div>
  </header>

  <p class="welcome-text">Escolha um módulo</p>
  <div class="cards-container">
      <a href="pages/cadastros.html" class="module-card">
          <div class="module-icon"><i class="fa-solid fa-file-signature"></i></div>
          <div class="module-text">Cadastros</div>
      </a>

      <a href="pages/lancamentos.html" class="module-card">
          <div class="module-icon"><i class="fa-solid fa-money-check-dollar"></i></div>
          <div class="module-text">Lançamentos</div>
      </a>

      <a href="pages/relatorios.html" class="module-card">
          <div class="module-icon"><i class="fa-solid fa-chart-line"></i></div>
          <div class="module-text">Relatórios</div>
      </a>
  </div>
</body>
</html>
