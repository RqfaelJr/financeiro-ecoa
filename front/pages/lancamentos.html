<!DOCTYPE html>
<html lang="pt-BR">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lançamentos</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <style>
            body { font-family: 'Inter', sans-serif; }
            /* Header */
            .header-bar { background: #fff; border-bottom: 1px solid #eee; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
            .header-left { display: flex; align-items: center; gap: 20px; }
            .header-title { font-size: 1.1rem; font-weight: 600; margin: 0; border-left: 2px solid #ddd; padding-left: 15px; color: #111; }
            .header-logo { font-weight: 700; font-size: 1.1rem; color: #4a5568; display: flex; align-items: center; gap: 8px; }
            .header-logo i { color: #a0aec0; }
            .header-right { display: flex; align-items: center; gap: 15px; color: #6c757d; }
            .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #e2e8f0; }
            .back-btn { color: #6c757d; text-decoration: none; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
            .back-btn:hover { color: #3182ce; }
            
            .page-header { margin-top: 20px; }
            .table-container { margin-top: 20px; }
        </style>
</head>
<body class="bg-light">

    <header class="header-bar">
        <div class="header-left">
            <a href="../index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
            <div class="header-logo" style="margin-left: 10px;">
                <i class="fa-solid fa-layer-group" style="color: #3182ce;"></i>
                Ecoa Financeiro
            </div>
            <h1 class="header-title">Lançamentos</h1>
        </div>
    </header>

    <div class="container">

        <div id="status" class="mt-3"></div>

        <div class="card table-container p-3 shadow-sm bg-white">
                        <div class="d-flex justify-content-between mb-2">
                                <h5 class="mb-0">Lista de Lançamentos</h5>
                                                <div class="d-flex gap-2">
                                                    <button id="btnOpenCadastrar" class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#cadastrarModal">Cadastrar Lançamento</button>
                                                </div>
                        </div>

            <div class="table-responsive">
                <table id="lancamentosTable" class="table table-striped table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Data</th>
                            <th>Débito</th>
                            <th>Crédito</th>
                            <th>Descrição</th>
                            <th class="text-end">Valor</th>
                            <th class="text-center" style="width: 80px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
        <div class="modal fade" id="cadastrarModal" tabindex="-1" aria-labelledby="cadastrarModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="cadastrarModalLabel">Cadastrar Lançamento</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                    </div>
                    <form id="formCadastrarLancamento">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="dataLancamento" class="form-label">Data</label>
                                <input type="date" id="dataLancamento" name="data" class="form-control" required />
                            </div>
                                            <div class="mb-3">
                                                <label for="debito" class="form-label">Débito</label>
                                                <select id="debito" name="debito" class="form-select" required>
                                                    <option value="">-- Selecione --</option>
                                                </select>
                                            </div>
                                            <div class="mb-3">
                                                <label for="credito" class="form-label">Crédito</label>
                                                <select id="credito" name="credito" class="form-select" required>
                                                    <option value="">-- Selecione --</option>
                                                </select>
                                            </div>
                            
                            <div class="mb-3">
                                <label for="descricaoLancamento" class="form-label">Descrição</label>
                                <input type="text" id="descricaoLancamento" name="descricao" class="form-control" />
                            </div>
                            <div class="mb-3">
                                <label for="valorLancamento" class="form-label">Valor</label>
                                <input type="number" step="0.01" id="valorLancamento" name="valor" class="form-control" required />
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="modal fade" id="excluirLancamentoModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-body text-center p-4">
                        <div class="mb-3 text-danger"><i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem;"></i></div>
                        <h4 class="mb-3 text-danger">Confirmação de Exclusão</h4>
                        <p class="text-muted mb-3">Tem certeza que deseja excluir este lançamento?</p>
                        <div class="bg-light p-3 rounded mb-4 text-start shadow-sm border" style="font-size: 0.95rem;">
                            <div class="mb-1"><i class="fa-regular fa-calendar text-secondary me-2"></i><strong>Data:</strong> <span id="lblExcluirData"></span></div>
                            <div class="mb-1"><i class="fa-solid fa-arrow-up text-danger me-2"></i><strong>Débito:</strong> <span id="lblExcluirDebito"></span></div>
                            <div class="mb-1"><i class="fa-solid fa-arrow-down text-success me-2"></i><strong>Crédito:</strong> <span id="lblExcluirCredito"></span></div>
                            <div><i class="fa-solid fa-money-bill-wave text-primary me-1"></i><strong> Valor:</strong> <span id="lblExcluirValor" class="text-dark fw-bold"></span></div>
                        </div>
                        <div class="d-flex justify-content-center gap-2">
                            <button type="button" class="btn btn-danger w-50" onclick="confirmarExclusaoLancamento()">Excluir</button>
                            <button type="button" class="btn btn-secondary w-50" data-bs-dismiss="modal">Voltar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/lancamentos.js"></script>
</body>
</html>
