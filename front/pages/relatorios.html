<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #eaebef; margin: 0; padding: 0; }
        
        /* Header */
        .header-bar { background: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-title { font-size: 1.1rem; font-weight: 600; margin: 0; border-left: 2px solid #ddd; padding-left: 15px; color: #111; }
        .header-logo { font-weight: 700; font-size: 1.1rem; color: #4a5568; display: flex; align-items: center; gap: 8px; }
        .header-logo i { color: #a0aec0; }
        .header-right { display: flex; align-items: center; gap: 18px; color: #666; font-size: 1.15rem; }
        
        .back-btn { color: #6c757d; text-decoration: none; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .back-btn:hover { color: #3182ce; }

        /* Report Cards */
        .cards-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding-top: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .report-card {
            background: #f5f6f8;
            border-radius: 8px;
            box-shadow: inset 1px 1px 0 rgba(255,255,255,1), 2px 3px 6px rgba(0,0,0,0.1), -1px -1px 2px rgba(255,255,255,0.6);
            border: 1px solid #d1d5da;
            display: flex;
            align-items: center;
            padding: 15px 20px;
            width: 260px;
            height: 90px;
            text-align: left;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .report-card:active {
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.08);
            transform: translateY(1px);
        }
        .report-card:hover {
            background: #fdfdfd;
        }
        .report-icon {
            font-size: 3.2rem;
            color: #8c929a;
            margin-right: 18px;
            text-align: center;
            width: 60px;
        }
        .report-text {
            font-size: 1.1rem;
            color: #111;
            font-weight: 500;
            line-height: 1.25;
        }
    </style>
</head>
<body>
    <header class="header-bar">
        <div class="header-left">
            <a href="/index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
            <div class="header-logo" style="margin-left: 10px;">
                <i class="fa-solid fa-layer-group" style="color: #3182ce;"></i>
                Ecoa Financeiro
            </div>
            <h1 class="header-title">Relatórios</h1>
        </div>
    </header>

    <div class="cards-container">
        <div class="report-card" data-bs-toggle="modal" data-bs-target="#periodoModal">
            <div class="report-icon"><i class="fa-solid fa-scale-balanced"></i></div>
            <div class="report-text">Balanço<br>Patrimonial</div>
        </div>

        <div class="report-card" data-bs-toggle="modal" data-bs-target="#razaoModal">
            <div class="report-icon"><i class="fa-solid fa-book-open"></i></div>
            <div class="report-text">Razão</div>
        </div>

        <div class="report-card" data-bs-toggle="modal" data-bs-target="#dreModal">
            <div class="report-icon"><i class="fa-solid fa-chart-pie"></i></div>
            <div class="report-text">DRE</div>
        </div>

        <div class="report-card" data-bs-toggle="modal" data-bs-target="#balanceteModal">
            <div class="report-icon"><i class="fa-solid fa-table-cells"></i></div>
            <div class="report-text">Balancete</div>
        </div>
    </div>

    <div class="modal fade" id="periodoModal" tabindex="-1" aria-labelledby="periodoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="periodoModalLabel">Selecionar período (Balanço)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <form id="periodoForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="startDate" class="form-label">Data</label>
                            <input type="date" id="date" name="date" class="form-control" required>
                        </div>
                        <div id="periodoError" class="text-danger small"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Gerar relatório</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="razaoModal" tabindex="-1" aria-labelledby="razaoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="razaoModalLabel">Razão - Selecionar conta e período</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <form id="razaoForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="tipoConta" class="form-label">Tipo</label>
                            <select id="tipoConta" class="form-select" required>
                                <option value="" selected disabled>Selecione</option>
                                <option value="ativos">Ativos</option>
                                <option value="passivos">Passivos</option>
                                <option value="despesas">Despesas</option>
                                <option value="receitas">Receitas</option>
                                <option value="patrimonios-liquidos">Patrimônio Líquido</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="contaSelect" class="form-label">Conta</label>
                            <select id="contaSelect" class="form-select" required disabled>
                                <option value="" selected>Selecione o tipo primeiro</option>
                            </select>
                        </div>
                        <div class="row g-3">
                            <div class="col-6">
                                <label for="startDateRazao" class="form-label">Data início</label>
                                <input type="date" id="startDateRazao" class="form-control" required>
                            </div>
                            <div class="col-6">
                                <label for="endDateRazao" class="form-label">Data fim</label>
                                <input type="date" id="endDateRazao" class="form-control" required>
                            </div>
                        </div>
                        <div id="razaoError" class="text-danger small mt-2"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Gerar razão</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="dreModal" tabindex="-1" aria-labelledby="dreModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="dreModalLabel">DRE - Selecionar período</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <form id="dreForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="startDateDRE" class="form-label">Data início</label>
                            <input type="date" id="startDateDRE" name="startDateDRE" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="endDateDRE" class="form-label">Data fim</label>
                            <input type="date" id="endDateDRE" name="endDateDRE" class="form-control" required>
                        </div>
                        <div id="dreError" class="text-danger small"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Gerar DRE</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="balanceteModal" tabindex="-1" aria-labelledby="balanceteModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="balanceteModalLabel">Balancete - Selecionar período</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <form id="balanceteForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="startDateBalancete" class="form-label">Data início</label>
                            <input type="date" id="startDateBalancete" name="startDateBalancete" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="endDateBalancete" class="form-label">Data fim</label>
                            <input type="date" id="endDateBalancete" name="endDateBalancete" class="form-control" required>
                        </div>
                        <div id="balanceteError" class="text-danger small"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Gerar Balancete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/relatorios.js"></script>
</body>
</html>
